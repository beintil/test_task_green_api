<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GREEN API Gateway</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    header span {
      font-weight: 700;
      color: #2db742;
      font-size: 15px;
      letter-spacing: 0.3px;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      padding: 32px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Left column ── */
    .left { display: flex; flex-direction: column; gap: 6px; }

    input, textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: #2db742; }
    textarea { resize: vertical; min-height: 80px; }

    .divider { height: 12px; }

    button {
      width: 100%;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #fff;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      color: #333;
    }
    button:hover  { background: #f0faf1; border-color: #2db742; color: #2db742; }
    button:active { background: #e2f5e4; }

    /* ── Right column ── */
    .right { display: flex; flex-direction: column; gap: 8px; }

    .right label {
      font-size: 13px;
      color: #555;
      font-weight: 500;
    }

    #response {
      flex: 1;
      min-height: 420px;
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      white-space: pre;
      overflow: auto;
      color: #222;
    }

    #response.error { color: #c0392b; }

    /* ── Footer ── */
    footer {
      text-align: right;
      padding: 16px 32px;
      font-size: 13px;
      font-weight: 600;
      color: #2db742;
    }
  </style>
</head>
<body>

<header>
  <span>GREEN API Gateway</span>
</header>

<main>
  <div class="left">
    <input id="idInstance"       placeholder="idInstance" />
    <input id="apiTokenInstance" placeholder="apiTokenInstance" />

    <div class="divider"></div>

    <button onclick="call('settings')">getSettings</button>
    <button onclick="call('state')">getStateInstance</button>

    <div class="divider"></div>

    <input id="chatIdMsg" placeholder="chatId" />
    <textarea id="message" placeholder="message"></textarea>
    <button onclick="call('sendMessage')">sendMessage</button>

    <div class="divider"></div>

    <input id="chatIdFile" placeholder="chatId" />
    <input id="urlFile"    placeholder="urlFile" />
    <input id="fileName"   placeholder="fileName" />
    <button onclick="call('sendFileByUrl')">sendFileByUrl</button>
  </div>

  <div class="right">
    <label>Ответ:</label>
    <pre id="response"></pre>
  </div>
</main>

<footer>GREEN API © 2025</footer>

<script>
  const BASE = '/v1/green-api';

  function creds() {
    return {
      idInstance:       document.getElementById('idInstance').value.trim(),
      apiTokenInstance: document.getElementById('apiTokenInstance').value.trim(),
    };
  }

  async function call(method) {
    const out = document.getElementById('response');
    out.className = '';
    out.textContent = '...';

    let url, body;

    switch (method) {
      case 'settings':
        url  = BASE + '/settings';
        body = creds();
        break;
      case 'state':
        url  = BASE + '/state';
        body = creds();
        break;
      case 'sendMessage':
        url  = BASE + '/send-message';
        body = {
          ...creds(),
          chatId:  document.getElementById('chatIdMsg').value.trim(),
          message: document.getElementById('message').value.trim(),
        };
        break;
      case 'sendFileByUrl':
        url  = BASE + '/send-file-by-url';
        body = {
          ...creds(),
          chatId:   document.getElementById('chatIdFile').value.trim(),
          urlFile:  document.getElementById('urlFile').value.trim(),
          fileName: document.getElementById('fileName').value.trim(),
        };
        break;
    }

    try {
      const res  = await fetch(url, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });
      const data = await res.json();
      out.textContent = JSON.stringify(data, null, 2);
      if (!res.ok) out.className = 'error';
    } catch (e) {
      out.className   = 'error';
      out.textContent = e.message;
    }
  }
</script>

</body>
</html>
